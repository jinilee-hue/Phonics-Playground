name: Deploy to GitHub Pages

# main·feature/design에 푸시하거나 수동 실행 시 디자인 모드(목업)로 빌드해 Pages에 배포
on:
  push:
    branches: [main, feature/design]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 1개만 유지
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install
        run: npm ci
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Build (design mode / mock data)
        env:
          VITE_DESIGN_MODE: 'true'
          # Pages는 /<repo>/ 하위에 서빙 → 저장소 이름을 그대로 base로 주입(저장소 이동에도 무수정)
          BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build
      - name: SPA fallback (404 → index.html)
        run: cp dist/index.html dist/404.html
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
